#Functions in Ansible

- name: Functions
  hosts: local
  connection: local
  vars:
    technologies: DevSecOps, Linux, Shell Scripting, Ansible
    name: Kirankumar k
    names: KIRAN KUMAR KOSURI
    tags:
      Application: payment
      Environment: DevOps
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev

  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Kiran') }}"

  #String to List
   
  - name: convert string to List
    ansible.builtin.debug:
      msg: "Technolgies are: {{ technologies | split(',') }}"

  - name: convert map to list
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }}"

  - name: convert list into map
    ansible.builtin.debug:
      msg: "Tag map: {{ listTags | items2dict }}"

  - name: convert uppercase 
    ansible.builtin.debug:
      msg: "{{ name | upper }}"

  - name: convert lowercase 
    ansible.builtin.debug:
      msg: "{{ names | lower }}"

