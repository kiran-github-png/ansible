- name: functions
  hosts: local
  connection: local
  vars:
    technologies: DevOps, Linux, Shell Scripting, Ansible
    # dictionary == map
    tags:
      Application: payment
      Environment: dev
    listTages:
    - key: Application
      value: payment
    - key: Environment
      value: dev
  tasks:
  - name: default variables
    ansible.builtin.debug:
      msg: "Hello, {{ name | default('Kiran') }}"

# String to List

  - name: Convert String to List 
    ansible.builtin.debug:
      msg: "Technologies are: {{ technologies | split(',') }}"

  - name: Converting Mao to List
    ansible.builtin.debug:
      msg: "Tags are: {{ tags | dict2items }} "

  - name: Converting Map to List
    ansible.builtin.debug:
      msg: "Tags Map: {{  listTages | items2dict }}"

  - name: Read yaml and take it into a vatiables
    ansible.builtin.set_fact:
    student_yaml:
      msg: "yaml: {{ lookup('file','student_yaml') | from_yaml }}"