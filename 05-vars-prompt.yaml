- name: variables from prompt
  hosts: local
  connection: local
  vars_prompt:
  - name: username
    prompt: What is Your Username?
    private: false

  - name: password
    prompt: What is Your password?
    private: true
  tasks:
  - name: print credentials
    ansible.builtin.debug:
      msg: "Hey, Username: {{ username }}, password {{ password }}"